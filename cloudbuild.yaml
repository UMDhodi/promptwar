steps:
  - name: python:3.12
    entrypoint: pip
    args: [install, -r, backend/requirements.txt]
  - name: python:3.12
    entrypoint: pytest
    args: [backend/tests/]
  - name: gcr.io/cloud-builders/docker
    args: [build, -t, gcr.io/$PROJECT_ID/stadiumiq-api, ./backend]
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/stadiumiq-api]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [run, deploy, stadiumiq-api, --image, gcr.io/$PROJECT_ID/stadiumiq-api, --region, us-central1, --allow-unauthenticated]
  - name: node:20
    dir: frontend
    entrypoint: npm
    args: [run, build]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: firebase
    args: [deploy, --only, hosting]
